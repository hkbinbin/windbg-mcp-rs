name: Release On Tag

# Publishes a GitHub release whenever a version tag (vX.Y.Z) is pushed.
#
# The release ships exactly the two binaries needed to run the tool:
#   - windbg_mcp_headless.exe : the thin MCP server
#   - windbg_cli.exe          : the debugger CLI / daemon (drives sessions)
#
# Both executables must sit in the SAME directory: the MCP server locates
# windbg_cli.exe next to itself when opening a session.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo version
        shell: pwsh
        run: |
          $cargoVersion = Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' | ForEach-Object { $_.Matches[0].Groups[1].Value }
          if (-not $cargoVersion) {
            throw "Unable to read version from Cargo.toml"
          }

          $expectedTag = "v$cargoVersion"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag ${{ github.ref_name }} does not match Cargo.toml version $cargoVersion"
          }

      - name: Build release binaries
        run: cargo build --release --bin windbg_mcp_headless --bin windbg_cli

      - name: Prepare release assets
        shell: pwsh
        run: |
          $assetDir = "dist"
          $archiveName = "windbg-mcp-rs-${{ github.ref_name }}-windows-x64.zip"
          $skillArchive = "windbg-cli-skill-${{ github.ref_name }}.zip"

          New-Item -ItemType Directory -Path $assetDir -Force | Out-Null

          # The two binaries that make up a working install.
          Copy-Item "target/release/windbg_mcp_headless.exe" "$assetDir/windbg_mcp_headless.exe"
          Copy-Item "target/release/windbg_cli.exe"          "$assetDir/windbg_cli.exe"

          # Bundle the agent skill so the all-in-one zip is complete.
          Copy-Item "skills" "$assetDir/skills" -Recurse -Force

          # A short usage note so the zip is self-explanatory.
          @"
          windbg-mcp-rs ${{ github.ref_name }}

          Contents:
            windbg_mcp_headless.exe  Thin MCP server (open/close session + help).
            windbg_cli.exe           Debugger CLI / daemon. Drives all debugging.
            skills/windbg-cli/       Agent skill: how to debug with these tools.

          IMPORTANT: keep both .exe files in the SAME folder. The MCP server
          starts windbg_cli.exe (located next to itself) to host debugger
          sessions, so they must stay together.

          MCP client config (stdio):
            {
              "mcpServers": {
                "windbg_mcp_headless": {
                  "command": "C:\\path\\to\\windbg_mcp_headless.exe",
                  "args": []
                }
              }
            }

          Then: windbg_open_session -> windbg_cli do --name <name> <action> -> windbg_close_session
          Run `windbg_cli --help` and `windbg_cli do --help` for the full action list.

          To install the agent skill, copy skills/windbg-cli into your
          ~/.workbuddy/skills/ directory (see skills/README.md).
          "@ | Set-Content -Path "$assetDir/README.txt" -Encoding utf8

          Compress-Archive -Path "$assetDir/*" -DestinationPath $archiveName -Force

          # Standalone skill zip (for users who already have the binaries).
          Compress-Archive -Path "skills/windbg-cli", "skills/README.md" -DestinationPath $skillArchive -Force

          # SHA-256 for the archives and each loose binary.
          $items = @(
            $archiveName,
            $skillArchive,
            "$assetDir/windbg_mcp_headless.exe",
            "$assetDir/windbg_cli.exe"
          )
          foreach ($item in $items) {
            $hash = (Get-FileHash $item -Algorithm SHA256).Hash.ToLowerInvariant()
            $name = Split-Path $item -Leaf
            Set-Content -Path "$item.sha256" -Value "$hash  $name"
          }

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          artifacts: |
            windbg-mcp-rs-${{ github.ref_name }}-windows-x64.zip
            windbg-mcp-rs-${{ github.ref_name }}-windows-x64.zip.sha256
            windbg-cli-skill-${{ github.ref_name }}.zip
            windbg-cli-skill-${{ github.ref_name }}.zip.sha256
            dist/windbg_mcp_headless.exe
            dist/windbg_mcp_headless.exe.sha256
            dist/windbg_cli.exe
            dist/windbg_cli.exe.sha256

