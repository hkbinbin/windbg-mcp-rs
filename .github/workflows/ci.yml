name: CI

# Build + test on every push to master and on pull requests.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Build (all targets)
        run: cargo build --release --bin windbg_mcp_headless --bin windbg_cli

      - name: Unit tests
        run: cargo test --lib

      - name: Clippy (no new warnings on the thin server / launcher)
        run: cargo clippy --lib --bin windbg_mcp_headless

      - name: Protocol smoke test (no debugger target required)
        shell: pwsh
        run: |
          python tools/headless_mcp_smoke.py
